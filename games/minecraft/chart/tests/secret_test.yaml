suite: secret tests
templates:
  - secret.yaml
tests:
  - it: should not render secret when no password set
    asserts:
      - hasDocuments:
          count: 0

  - it: should render secret when password is set
    set:
      security.rcon.password: mypassword
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: stringData.RCON_PASSWORD
          value: mypassword

  - it: should not render secret when existingSecret is set
    set:
      security.rcon.password: mypassword
      security.rcon.existingSecret: my-existing-secret
    asserts:
      - hasDocuments:
          count: 0
