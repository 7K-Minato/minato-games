suite: fleet tests
templates:
  - fleet.yaml
tests:
  - it: should not render fleet when disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should render fleet when enabled
    set:
      fleet.enabled: true
      fleet.replicas: 3
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: GameServerFleet
      - equal:
          path: spec.replicas
          value: 3
      - equal:
          path: spec.profile
          value: RELEASE-NAME-minecraft-paper

  - it: should include update strategy
    set:
      fleet.enabled: true
    asserts:
      - equal:
          path: spec.updateStrategy.type
          value: RollingUpdate
      - equal:
          path: spec.updateStrategy.rollingUpdate.maxUnavailable
          value: 1
      - equal:
          path: spec.updateStrategy.rollingUpdate.maxSurge
          value: 1
