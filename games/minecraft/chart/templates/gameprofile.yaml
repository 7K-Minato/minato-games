apiVersion: operator.minato.io/v1
kind: GameProfile
metadata:
  name: {{ include "minato-games.profileName" . }}
  labels:
    {{- include "minato-games.labels" . | nindent 4 }}
spec:
  displayName: "Minecraft Paper"
  image: {{ .Values.game.image | quote }}
  imagePullPolicy: {{ .Values.game.imagePullPolicy }}
  ports:
    {{- range .Values.game.ports }}
    - name: {{ .name }}
      containerPort: {{ .containerPort }}
      protocol: {{ .protocol }}
    {{- end }}
  environment:
    - key: EULA
      default: "true"
      required: true
    - key: TYPE
      default: "PAPER"
      required: false
    - key: VERSION
      default: "1.20.4"
      required: false
    - key: MEMORY
      default: "2G"
      required: false
    - key: ENABLE_RCON
      default: "true"
      required: false
    - key: RCON_PORT
      default: "25575"
      required: false
    - key: RCON_PASSWORD
      default: "minato-rcon"
      required: false
  resources:
    {{- toYaml .Values.game.resources | nindent 4 }}
  storage:
    mountPath: {{ .Values.game.storage.mountPath | quote }}
    sizeDefault: {{ .Values.game.storage.size | quote }}
  agent:
    image: {{ .Values.game.agent.image | quote }}
    version: {{ .Values.game.agent.version | quote }}
  actions:
    {{- range .Values.game.actions }}
    - name: {{ .name }}
      description: {{ .description | quote }}
      concurrency: {{ .concurrency }}
      timeout: {{ .timeout }}
      {{- if .params }}
      params:
        {{- range $key, $val := .params }}
        {{ $key }}:
          type: {{ $val.type }}
          required: {{ $val.required }}
          {{- if $val.description }}
          description: {{ $val.description | quote }}
          {{- end }}
        {{- end }}
      {{- end }}
    {{- end }}
  capabilities:
    {{- toYaml .Values.game.capabilities | nindent 4 }}
