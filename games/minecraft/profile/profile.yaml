apiVersion: operator.minato.io/v1
kind: GameProfile
metadata:
  name: minecraft-paper
  labels:
    app.kubernetes.io/name: minato
spec:
  displayName: "Minecraft Paper"
  image: "itzg/minecraft-server:latest"
  ports:
    - name: game
      containerPort: 25565
      protocol: TCP
    - name: rcon
      containerPort: 25575
      protocol: TCP
  environment:
    - key: EULA
      default: "true"
      required: true
    - key: TYPE
      default: "PAPER"
      required: false
    - key: VERSION
      default: "1.20.4"
      required: false
    - key: MEMORY
      default: "2G"
      required: false
    - key: ENABLE_RCON
      default: "true"
      required: false
    - key: RCON_PORT
      default: "25575"
      required: false
    - key: RCON_PASSWORD
      default: "minato-rcon"
      required: false
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2
      memory: 4Gi
  storage:
    mountPath: /data
    sizeDefault: 20Gi
  agent:
    image: "harbor.7kgroup.com/7kminato/minato-agent-minecraft:v0.1.0"
    version: "0.1.0"
  actions:
    - name: restart
      description: "Gracefully restart the server"
      concurrency: serialize
      timeout: 5m
    - name: save-world
      description: "Save the game world"
      concurrency: exclusive
      timeout: 2m
    - name: send-message
      description: "Broadcast a message to all players"
      params:
        message:
          type: string
          required: true
          description: "Message to broadcast"
      concurrency: allow
      timeout: 30s
    - name: kick-player
      description: "Kick a player from the server"
      params:
        player:
          type: string
          required: true
        reason:
          type: string
          required: false
      concurrency: allow
      timeout: 30s
    - name: op-player
      description: "Give operator status to a player"
      params:
        player:
          type: string
          required: true
      concurrency: allow
      timeout: 30s
    - name: deop-player
      description: "Remove operator status from a player"
      params:
        player:
          type: string
          required: true
      concurrency: allow
      timeout: 30s
    - name: whitelist-add
      description: "Add a player to the whitelist"
      params:
        player:
          type: string
          required: true
      concurrency: allow
      timeout: 30s
    - name: whitelist-remove
      description: "Remove a player from the whitelist"
      params:
        player:
          type: string
          required: true
      concurrency: allow
      timeout: 30s
  capabilities:
    files: true
    sftp: true
    backup: true
    restoreFromSnapshot: true
