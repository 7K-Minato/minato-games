apiVersion: operator.minato.io/v1
kind: GameProfile
metadata:
  name: {{ include "minato-games.profileName" . }}
  labels:
    {{- include "minato-games.labels" . | nindent 4 }}
spec:
  displayName: "Counter-Strike 2"
  image: {{ .Values.game.image | quote }}
  imagePullPolicy: {{ .Values.game.imagePullPolicy }}
  ports:
    {{- range .Values.game.ports }}
    - name: {{ .name }}
      containerPort: {{ .containerPort }}
      protocol: {{ .protocol }}
    {{- end }}
  environment:
    - key: SRCDS_TOKEN
      default: ""
      required: true
    - key: SRCDS_RCONPW
      default: ""
      required: true
    - key: SRCDS_PW
      default: ""
      required: false
    - key: SRCDS_MAXPLAYERS
      default: "64"
      required: false
    - key: SRCDS_TICKRATE
      default: "128"
      required: false
    - key: SRCDS_STARTMAP
      default: "de_dust2"
      required: false
    - key: SRCDS_GAMETYPE
      default: "0"
      required: false
    - key: SRCDS_GAMEMODE
      default: "1"
      required: false
  resources:
    {{- toYaml .Values.game.resources | nindent 4 }}
  storage:
    mountPath: {{ .Values.game.storage.mountPath | quote }}
    sizeDefault: {{ .Values.game.storage.size | quote }}
    {{- if .Values.game.storage.storageClass }}
    storageClassDefault: {{ .Values.game.storage.storageClass | quote }}
    {{- end }}
  agent:
    image: {{ .Values.game.agent.image | quote }}
    version: {{ .Values.game.agent.version | quote }}
    resources:
      {{- toYaml .Values.game.agent.resources | nindent 6 }}
  actions:
    {{- range .Values.game.actions }}
    - name: {{ .name }}
      description: {{ .description | quote }}
      concurrency: {{ .concurrency }}
      timeout: {{ .timeout }}
      {{- if .params }}
      params:
        {{- range $key, $val := .params }}
        {{ $key }}:
          type: {{ $val.type }}
          required: {{ $val.required }}
          {{- if $val.description }}
          description: {{ $val.description | quote }}
          {{- end }}
        {{- end }}
      {{- end }}
    {{- end }}
  capabilities:
    {{- toYaml .Values.game.capabilities | nindent 4 }}
