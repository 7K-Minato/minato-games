# Default values for ${{ values.gameName }}.

# -- Override the name of the chart
nameOverride: ""
# -- Override the full name of the release
fullnameOverride: ""

# GameProfile configuration
# The GameProfile is cluster-scoped and defines the game type.
gameProfile:
  # -- Override the GameProfile name (defaults to release fullname)
  nameOverride: ""

# Game server configuration
game:
  # -- Game container image
  image: ${{ values.gameImage }}
  imagePullPolicy: IfNotPresent

  # -- Game ports
  ports:
{%- for port in values.ports %}
    - name: ${{ port.name }}
      containerPort: ${{ port.containerPort }}
      protocol: ${{ port.protocol | default('TCP') }}
{%- endfor %}

  # -- Environment variables for the game server
  env:
{%- for key, value in values.defaultEnv %}
    ${{ key }}: "${{ value }}"
{%- endfor %}

  # -- Resource requirements
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

  # -- Storage configuration
  storage:
    size: ${{ values.storageSize }}
    storageClass: ""
    mountPath: ${{ values.storageMountPath }}

  # -- Agent configuration
  agent:
    image: ${{ values.agentImage }}
    version: "${{ values.agentVersion }}"
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  # -- Declared actions
  actions:
{%- for action in values.actions %}
    - name: ${{ action.name }}
      description: "${{ action.description }}"
      concurrency: ${{ action.concurrency | default('allow') }}
      timeout: ${{ action.timeout | default('5m') }}
{%- if action.params %}
      params:
{%- for paramName, paramDef in action.params %}
        ${{ paramName }}:
          type: ${{ paramDef.type | default('string') }}
          required: ${{ paramDef.required | default(true) }}
{%- if paramDef.description %}
          description: "${{ paramDef.description }}"
{%- endif %}
{%- endfor %}
{%- endif %}
{%- endfor %}

  # -- Capabilities
  capabilities:
{%- for cap, enabled in values.capabilities %}
    ${{ cap }}: ${{ enabled }}
{%- endfor %}

# Fleet configuration
fleet:
  # -- Enable GameServerFleet
  enabled: false
  # -- Number of GameServer replicas
  replicas: 1
  # -- Update strategy
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
      drainTimeoutSeconds: 300

# Networking
networking:
  # -- Expose mode: ClusterIP, NodePort, LoadBalancer, or HostPort
  exposeMode: ClusterIP

# Security
security:
  # -- Enable NetworkPolicy
  networkPolicy:
    enabled: true
  # -- RCON/admin password configuration
  rcon:
    # -- Admin password (leave empty to auto-generate)
    password: ""
    # -- Use an existing secret instead of creating one
    existingSecret: ""

# Monitoring
monitoring:
  # -- Enable ServiceMonitor for Prometheus
  serviceMonitor:
    enabled: false
    interval: 30s
    labels: {}

# Service account
serviceAccount:
  create: true
  name: ""
  annotations: {}

# Library chart (internal)
library:
  enabled: true
