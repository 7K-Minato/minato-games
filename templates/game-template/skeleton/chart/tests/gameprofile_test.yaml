suite: gameprofile tests
templates:
  - gameprofile.yaml
tests:
  - it: should render GameProfile with correct name
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: GameProfile
      - equal:
          path: metadata.name
          value: RELEASE-NAME-${{ values.gameName }}

  - it: should use nameOverride when set
    set:
      gameProfile.nameOverride: my-game
    asserts:
      - equal:
          path: metadata.name
          value: my-game

  - it: should include correct ports
    asserts:
      - equal:
          path: spec.ports
          value:
{%- for port in values.ports %}
            - name: ${{ port.name }}
              containerPort: ${{ port.containerPort }}
              protocol: ${{ port.protocol | default('TCP') }}
{%- endfor %}

  - it: should include agent configuration
    asserts:
      - equal:
          path: spec.agent.image
          value: ${{ values.agentImage }}
      - equal:
          path: spec.agent.version
          value: "${{ values.agentVersion }}"

  - it: should include capabilities
    asserts:
      - equal:
          path: spec.capabilities
          value:
{%- for cap, enabled in values.capabilities %}
            ${{ cap }}: ${{ enabled }}
{%- endfor %}
