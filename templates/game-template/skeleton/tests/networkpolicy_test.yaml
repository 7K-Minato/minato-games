suite: networkpolicy tests
templates:
  - networkpolicy.yaml
tests:
  - it: should render network policy
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: NetworkPolicy
      - equal:
          path: metadata.name
          value: RELEASE-NAME-${{ values.gameName }}
      - equal:
          path: spec.podSelector.matchLabels
          value:
            app.kubernetes.io/name: ${{ values.gameName }}
            app.kubernetes.io/instance: RELEASE-NAME
