apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: minato-game-template
  title: Minato Game
  description: Scaffold a new game server for the Minato platform (chart, agent, and profile)
  tags:
    - helm
    - gameserver
    - minato
    - go
spec:
  owner: 7k-group
  type: service

  parameters:
    - title: Game Information
      required:
        - gameName
        - displayName
        - description
        - gameImage
      properties:
        gameName:
          title: Game Name
          type: string
          description: Short kebab-case name for the game (e.g., minecraft, cs2, palworld)
          pattern: '^[a-z0-9]+(-[a-z0-9]+)*$'
          ui:autofocus: true

        displayName:
          title: Display Name
          type: string
          description: Human-readable game name (e.g., "Minecraft")

        description:
          title: Description
          type: string
          description: Brief description of the game server

        gameImage:
          title: Game Container Image
          type: string
          description: Docker image for the game server (e.g., itzg/minecraft-server:latest)

        appVersion:
          title: App Version
          type: string
          description: Application version (e.g., 1.20.4, latest)
          default: latest

    - title: Game Configuration
      properties:
        ports:
          title: Game Ports
          type: array
          description: Ports exposed by the game server
          default:
            - name: game
              containerPort: 25565
              protocol: TCP
          items:
            type: object
            required:
              - name
              - containerPort
            properties:
              name:
                type: string
              containerPort:
                type: integer
                minimum: 1
                maximum: 65535
              protocol:
                type: string
                enum: [TCP, UDP]
                default: TCP

        storageSize:
          title: Storage Size
          type: string
          description: Persistent storage size
          default: 20Gi

        storageMountPath:
          title: Storage Mount Path
          type: string
          description: Path where game data is mounted
          default: /data

        defaultEnv:
          title: Default Environment Variables
          type: object
          description: Key-value pairs for default environment variables
          default:
            EULA: "true"

        agentImage:
          title: Minato Agent Image
          type: string
          description: Minato agent sidecar image
          default: harbor.7kgroup.com/minato-games/minato-agent-generic:v0.1.0

        agentVersion:
          title: Agent Version
          type: string
          default: "0.1.0"

        actions:
          title: Declared Actions
          type: array
          description: Actions that can be performed on the game server
          default:
            - name: restart
              description: "Restart the server"
              concurrency: serialize
              timeout: 5m
          items:
            type: object
            required:
              - name
              - description
            properties:
              name:
                type: string
              description:
                type: string
              concurrency:
                type: string
                enum: [serialize, exclusive, allow]
                default: allow
              timeout:
                type: string
                default: 5m
              params:
                type: object
                description: Action parameters

        capabilities:
          title: Capabilities
          type: object
          default:
            files: true
            sftp: true
            backup: true
            restoreFromSnapshot: true
          properties:
            files:
              type: boolean
              default: true
            sftp:
              type: boolean
              default: true
            backup:
              type: boolean
              default: true
            restoreFromSnapshot:
              type: boolean
              default: true

    - title: Repository Settings
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
            allowedOwners:
              - 7k-group

  steps:
    - id: fetch-chart-template
      name: Fetch Chart Template
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: games/${{ parameters.gameName }}/chart
        values:
          gameName: ${{ parameters.gameName }}
          displayName: ${{ parameters.displayName }}
          description: ${{ parameters.description }}
          gameImage: ${{ parameters.gameImage }}
          appVersion: ${{ parameters.appVersion }}
          ports: ${{ parameters.ports }}
          storageSize: ${{ parameters.storageSize }}
          storageMountPath: ${{ parameters.storageMountPath }}
          defaultEnv: ${{ parameters.defaultEnv }}
          agentImage: ${{ parameters.agentImage }}
          agentVersion: ${{ parameters.agentVersion }}
          actions: ${{ parameters.actions }}
          capabilities: ${{ parameters.capabilities }}

    - id: create-agent-main
      name: Create Agent Main
      action: fs:write
      input:
        path: games/${{ parameters.gameName }}/agent/main.go
        content: |
          package main

          import (
          	"context"
          	"fmt"
          	"os"

          	"google.golang.org/protobuf/types/known/anypb"

          	agentv1 "github.com/7k-group/minato/api/agent/v1/minato/agent/v1"
          	"github.com/7k-group/minato/sdk/agent/server"
          )

          type ${{ parameters.gameName | replace("-", "") }}Agent struct {
          	name    string
          	version string
          }

          func main() {
          	agent := &${{ parameters.gameName | replace("-", "") }}Agent{
          		name:    "minato-${{ parameters.gameName }}",
          		version: "0.1.0",
          	}

          	_, err := server.Serve(agent, server.Options{})
          	if err != nil {
          		panic(err)
          	}

          	select {}
          }

          func (a *${{ parameters.gameName | replace("-", "") }}Agent) Info(ctx context.Context, req *agentv1.InfoRequest) (*agentv1.InfoResponse, error) {
          	actions := []*agentv1.ActionSchema{
          		{Name: "restart", Description: "Restart the server", Params: map[string]*agentv1.ParamSchema{}},
          	}

          	return &agentv1.InfoResponse{
          		Name:    a.name,
          		Version: a.version,
          		Actions: actions,
          		Metrics: []*agentv1.MetricDescriptor{},
          	}, nil
          }

          func (a *${{ parameters.gameName | replace("-", "") }}Agent) HealthCheck(ctx context.Context, req *agentv1.HealthRequest) (*agentv1.HealthResponse, error) {
          	return &agentv1.HealthResponse{Ready: true, Message: "healthy"}, nil
          }

          func (a *${{ parameters.gameName | replace("-", "") }}Agent) PrepareShutdown(ctx context.Context, req *agentv1.ShutdownRequest) (*agentv1.ShutdownResponse, error) {
          	return &agentv1.ShutdownResponse{Success: true}, nil
          }

          func (a *${{ parameters.gameName | replace("-", "") }}Agent) GetPlayers(ctx context.Context, req *agentv1.PlayersRequest) (*agentv1.PlayersResponse, error) {
          	return &agentv1.PlayersResponse{Online: 0, Capacity: 32}, nil
          }

          func (a *${{ parameters.gameName | replace("-", "") }}Agent) ExecuteAction(ctx context.Context, req *agentv1.ExecuteActionRequest) (*agentv1.ExecuteActionResponse, error) {
          	switch req.ActionName {
          	case "restart":
          		return &agentv1.ExecuteActionResponse{State: agentv1.ActionState_ACTION_STATE_SUCCEEDED}, nil
          	default:
          		return &agentv1.ExecuteActionResponse{State: agentv1.ActionState_ACTION_STATE_REJECTED, Error: "unknown action"}, nil
          	}
          }

          func (a *${{ parameters.gameName | replace("-", "") }}Agent) Console(stream agentv1.Agent_ConsoleServer) error {
          	for {
          		msg, err := stream.Recv()
          		if err != nil {
          			return err
          		}
          		_ = stream.Send(&agentv1.ConsoleServerMessage{
          			Payload: &agentv1.ConsoleServerMessage_Response{Response: &agentv1.ConsoleResponse{Response: "ok"}},
          		})
          	}
          }

    - id: create-agent-dockerfile
      name: Create Agent Dockerfile
      action: fs:write
      input:
        path: games/${{ parameters.gameName }}/agent/Dockerfile
        content: |
          # Build stage
          FROM golang:1.26-alpine AS builder

          WORKDIR /build
          COPY go.mod go.sum ./
          RUN go mod download

          COPY games/${{ parameters.gameName }}/agent/ ./
          RUN CGO_ENABLED=0 GOOS=linux go build -ldflags='-s -w' -o agent .

          # Final stage
          FROM gcr.io/distroless/static:nonroot

          COPY --from=builder /build/agent /usr/local/bin/agent

          USER nonroot:nonroot

          EXPOSE 8080

          ENTRYPOINT ["/usr/local/bin/agent"]

    - id: create-profile
      name: Create GameProfile
      action: fs:write
      input:
        path: games/${{ parameters.gameName }}/profile/profile.yaml
        content: |
          apiVersion: operator.minato.io/v1
          kind: GameProfile
          metadata:
            name: ${{ parameters.gameName }}
          spec:
            displayName: "${{ parameters.displayName }}"
            description: "${{ parameters.description }}"
            image: "${{ parameters.gameImage }}"
            imagePullPolicy: IfNotPresent

            agent:
              image: "${{ parameters.agentImage }}"
              version: "${{ parameters.agentVersion }}"

            ports:
              ${{ parameters.ports | json }}

            storage:
              mountPath: "${{ parameters.storageMountPath }}"
              sizeDefault: "${{ parameters.storageSize }}"
              sizeMin: 1Gi
              sizeMax: 100Gi
              accessModes:
                - ReadWriteOnce

            capabilities:
              files: ${{ parameters.capabilities.files }}
              sftp: ${{ parameters.capabilities.sftp }}
              backup: ${{ parameters.capabilities.backup }}
              restoreFromSnapshot: ${{ parameters.capabilities.restoreFromSnapshot }}

            actions:
              ${{ parameters.actions | json }}

    - id: create-gameserver-example
      name: Create GameServer Example
      action: fs:write
      input:
        path: games/${{ parameters.gameName }}/profile/gameserver-example.yaml
        content: |
          apiVersion: operator.minato.io/v1
          kind: GameServer
          metadata:
            name: ${{ parameters.gameName }}-server-1
            namespace: default
          spec:
            profile: ${{ parameters.gameName }}
            tier: medium
            env:
              ${{ parameters.defaultEnv | json }}

    - id: create-profile-readme
      name: Create Profile README
      action: fs:write
      input:
        path: games/${{ parameters.gameName }}/profile/README.md
        content: |
          # ${{ parameters.displayName }} Profile

          This profile configures a ${{ parameters.displayName }} dedicated server.

          ## Game Details

          - **Image**: `${{ parameters.gameImage }}`
          - **Documentation**: TBD

          ## Agent

          - **Image**: `${{ parameters.agentImage }}`
          - **Version**: `${{ parameters.agentVersion }}`

          ## Configuration

          The profile supports the following environment variables via `spec.env`:

          ${{ parameters.defaultEnv | json }}

          ## Storage

          - **Default Size**: `${{ parameters.storageSize }}`
          - **Mount Path**: `${{ parameters.storageMountPath }}`
          - **Access Mode**: ReadWriteOnce

          ## Ports

          ${{ parameters.ports | json }}

          ## Actions

          ${{ parameters.actions | json }}

    - id: read-chart-yaml
      name: Read Chart.yaml
      action: fs:read
      input:
        path: games/${{ parameters.gameName }}/chart/Chart.yaml

    - id: update-release-please
      name: Update Release Please Config
      action: fs:read
      input:
        path: release-please-config.json

    - id: update-manifest
      name: Update Release Please Manifest
      action: fs:read
      input:
        path: .release-please-manifest.json

    - id: patch-config
      name: Patch Release Please Config
      action: roadiehq:utils:jsonata:transform
      input:
        path: release-please-config.json
        expression: |
          $merge([$, {
            "packages": $merge([$.packages, {
              "games/${{ parameters.gameName }}": {
                "component": "${{ parameters.gameName }}",
                "release-type": "go",
                "include-component-in-tag": true,
                "changelog-path": "CHANGELOG.md",
                "extra-files": [
                  "chart/Chart.yaml",
                  "agent/main.go"
                ]
              }
            }])
          }])

    - id: write-config
      name: Write Updated Config
      action: fs:write
      input:
        path: release-please-config.json
        content: ${{ steps.patch-config.output.result }}

    - id: patch-manifest
      name: Patch Release Please Manifest
      action: roadiehq:utils:jsonata:transform
      input:
        path: .release-please-manifest.json
        expression: |
          $merge([$, {
            "games/${{ parameters.gameName }}": "0.1.0"
          }])

    - id: write-manifest
      name: Write Updated Manifest
      action: fs:write
      input:
        path: .release-please-manifest.json
        content: ${{ steps.patch-manifest.output.result }}

    - id: create-pr
      name: Create Pull Request
      action: publish:github:pull-request
      input:
        repoUrl: ${{ parameters.repoUrl }}
        branchName: feat/add-${{ parameters.gameName }}-game
        title: "feat(${{ parameters.gameName }}): add ${{ parameters.displayName }} game"
        description: |
          This PR adds a new game for ${{ parameters.displayName }}.

          ## Changes
          - Added `games/${{ parameters.gameName }}/` with:
            - `chart/` - Helm chart for the game
            - `agent/` - Minato agent implementation
            - `profile/` - GameProfile and example GameServer
          - Updated `release-please-config.json` to include new game
          - Updated `.release-please-manifest.json` with initial version

          ## Game Details
          - **Image**: `${{ parameters.gameImage }}`
          - **Storage**: `${{ parameters.storageSize }}` at `${{ parameters.storageMountPath }}`
          - **Ports**: ${{ parameters.ports | json }}
          - **Agent**: `${{ parameters.agentImage }}`

          ## Next Steps
          1. Review the generated chart, agent, and profile
          2. Implement game-specific agent logic in `games/${{ parameters.gameName }}/agent/main.go`
          3. Merge to trigger CI/CD
        targetPath: .

  output:
    links:
      - title: Pull Request
        url: ${{ steps.create-pr.output.remoteUrl }}
      - title: Repository
        url: ${{ parameters.repoUrl }}
    text:
      - title: Summary
        content: |
          Created PR for ${{ parameters.displayName }} game.

          The game is located at `games/${{ parameters.gameName }}/` with:
          - Chart: `games/${{ parameters.gameName }}/chart/`
          - Agent: `games/${{ parameters.gameName }}/agent/`
          - Profile: `games/${{ parameters.gameName }}/profile/`
