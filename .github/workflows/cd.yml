name: CD

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
  HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      cs2--release_created: ${{ steps.release.outputs['games/cs2--release_created'] }}
      cs2--tag_name: ${{ steps.release.outputs['games/cs2--tag_name'] }}
      cs2--version: ${{ steps.release.outputs['games/cs2--version'] }}
      minecraft--release_created: ${{ steps.release.outputs['games/minecraft--release_created'] }}
      minecraft--tag_name: ${{ steps.release.outputs['games/minecraft--tag_name'] }}
      minecraft--version: ${{ steps.release.outputs['games/minecraft--version'] }}
      palworld--release_created: ${{ steps.release.outputs['games/palworld--release_created'] }}
      palworld--tag_name: ${{ steps.release.outputs['games/palworld--tag_name'] }}
      palworld--version: ${{ steps.release.outputs['games/palworld--version'] }}
      generic--release_created: ${{ steps.release.outputs['games/generic--release_created'] }}
      generic--tag_name: ${{ steps.release.outputs['games/generic--tag_name'] }}
      generic--version: ${{ steps.release.outputs['games/generic--version'] }}
    steps:
      - uses: actions/checkout@v6
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  prepare-matrix:
    needs: release-please
    runs-on: ubuntu-latest
    outputs:
      agents: ${{ steps.agents.outputs.matrix }}
      game-charts: ${{ steps.charts.outputs.matrix }}
    steps:
      - id: agents
        run: |
          matrix='{"include":[]}'
          
          if [ "${{ needs.release-please.outputs.cs2--release_created }}" == "true" ]; then
            matrix=$(echo "$matrix" | jq -c '.include += [{"game":"cs2","image-name":"minato-agent-cs2","version":"${{ needs.release-please.outputs.cs2--version }}"}]')
          fi
          
          if [ "${{ needs.release-please.outputs.minecraft--release_created }}" == "true" ]; then
            matrix=$(echo "$matrix" | jq -c '.include += [{"game":"minecraft","image-name":"minato-agent-minecraft","version":"${{ needs.release-please.outputs.minecraft--version }}"}]')
          fi
          
          if [ "${{ needs.release-please.outputs.palworld--release_created }}" == "true" ]; then
            matrix=$(echo "$matrix" | jq -c '.include += [{"game":"palworld","image-name":"minato-agent-palworld","version":"${{ needs.release-please.outputs.palworld--version }}"}]')
          fi
          
          if [ "${{ needs.release-please.outputs.generic--release_created }}" == "true" ]; then
            matrix=$(echo "$matrix" | jq -c '.include += [{"game":"generic","image-name":"minato-agent-generic","version":"${{ needs.release-please.outputs.generic--version }}"}]')
          fi
          
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Agent matrix: $matrix"
      
      - id: charts
        run: |
          matrix='{"include":[]}'
          
          if [ "${{ needs.release-please.outputs.cs2--release_created }}" == "true" ]; then
            matrix=$(echo "$matrix" | jq -c '.include += [{"chart":"cs2","path":"games/cs2/chart","version":"${{ needs.release-please.outputs.cs2--version }}"}]')
          fi
          
          if [ "${{ needs.release-please.outputs.minecraft--release_created }}" == "true" ]; then
            matrix=$(echo "$matrix" | jq -c '.include += [{"chart":"minecraft","path":"games/minecraft/chart","version":"${{ needs.release-please.outputs.minecraft--version }}"}]')
          fi
          
          if [ "${{ needs.release-please.outputs.palworld--release_created }}" == "true" ]; then
            matrix=$(echo "$matrix" | jq -c '.include += [{"chart":"palworld","path":"games/palworld/chart","version":"${{ needs.release-please.outputs.palworld--version }}"}]')
          fi

          if [ "${{ needs.release-please.outputs.generic--release_created }}" == "true" ]; then
            matrix=$(echo "$matrix" | jq -c '.include += [{"chart":"generic","path":"games/generic/chart","version":"${{ needs.release-please.outputs.generic--version }}"}]')
          fi
          
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Game chart matrix: $matrix"

  publish-agents:
    needs: prepare-matrix
    if: ${{ needs.prepare-matrix.outputs.agents != '{"include":[]}' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.agents) }}
    env:
      IMAGE: ${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${{ matrix.image-name }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Login to Harbor
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_NAME }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ matrix.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ matrix.version }}
            type=semver,pattern={{major}},value=${{ matrix.version }}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./games/${{ matrix.game }}/agent/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

      - name: Sign image with cosign (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Verify signature
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp '^https://github\.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/\.github/workflows/cd\.yml@.*$' \
            "${IMAGE}@${DIGEST}"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM to image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign attest --yes --type spdxjson --predicate sbom.spdx.json "${IMAGE}@${DIGEST}"

  publish-game-charts:
    needs: [prepare-matrix]
    if: ${{ needs.prepare-matrix.outputs.game-charts != '{"include":[]}' }}
    strategy:
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.game-charts) }}
    uses: 7K-Hiroba/workflows-library/.github/workflows/release-helm.yml@v1
    secrets:
      HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
      HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
      HARBOR_ROBOT_NAME: ${{ secrets.HARBOR_ROBOT_NAME }}
      HARBOR_ROBOT_TOKEN: ${{ secrets.HARBOR_ROBOT_TOKEN }}
    with:
      path: ${{ matrix.path }}
      version: ${{ matrix.version }}
